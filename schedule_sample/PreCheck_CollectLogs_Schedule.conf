# =============================================================================
# PreCheck_CollectLogs_Schedule.conf 운영 가이드
#
# 한 줄 형식: [서버ID][서버IP][수집대상파일경로][스케줄표현식]
#   - '#'로 시작하거나 빈 줄은 무시된다.
#   - 배치 스케줄 표현식: 배치|요일|시작시간            (3개 토큰)
#   - 주기 스케줄 표현식: 주기|요일|시작시간|간격(분)|종료시간 (5개 토큰)
#
# -----------------------------------------------------------------------------
# 1. 배치 (scheduleType = "배치")
#   - 스케줄 시작시간에 단 한 번, 파일 전체를 1번 라인부터 끝까지 읽는다.
#   - LAST_LINE_NUMBER를 전혀 사용하지 않으므로, "날짜가 바뀌면 리셋"이라는 개념 자체가
#     없다 — 실행될 때마다 항상 처음부터 전체를 읽는다.
#   - 파일 크기가 INIT_COLLECT_SIZE_LIMIT_BYTES(300MB) 이상이면 영구 제외(EXCLUDE)
#     등록되어 이후 수집되지 않는다. 큰 파일은 배치 대상으로 설정하지 않는다.
#
# 2. 주기 (scheduleType = "주기") — 기본 동작
#   - 직전 성공 수집의 LAST_LINE_NUMBER 다음 라인부터 파일 끝까지 증분 수집한다
#     (이미 읽은 라인은 다시 읽지 않음).
#   - 단, 직전 성공 수집의 COLLECT_DATE(수집 일자)가 오늘과 다르면 LAST_LINE_NUMBER를
#     무시하고 파일을 1번 라인부터 다시 읽는다(날짜가 바뀌면 자동 리셋).
#   - 한 번에 50MB(PART_COLLECT_SIZE_LIMIT_BYTES) 이상 증가한 경우 영구 제외 등록된다.
#
# -----------------------------------------------------------------------------
# 3. 파일경로 안의 "yyyymmdd" → 당일 날짜(yyyyMMdd)로 자동 치환
#   - 적용 대상: 배치/주기 모두.
#   - 예) /logs/check.yyyymmdd  → (2026-06-12 수집 시) /logs/check.20260612
#   - 로그 파일이 날짜별로 별도 파일(예: check.20260612, check.20260613 ...)로
#     쌓이는 운영 환경에서 사용한다. 매일 다른 실제 파일을 대상으로 하므로,
#     "주기" 수집이라도 자정이 지나면 자연히 새 파일의 1번 라인부터 시작된다.
#
# 4. 파일경로 끝의 '+' → 날짜 기준 리셋 비활성화 (위 2번 항목 한정)
#   - 적용 대상: "주기" 수집에만 의미가 있다(배치는 항상 처음부터 읽으므로 영향 없음).
#   - 실제 파일경로에서는 '+'가 제거된다 (예: check.log+ → check.log).
#   - COLLECT_DATE와 무관하게 LAST_LINE_NUMBER를 그대로 이어서 사용한다.
#   - 자정이 지나도 같은 파일에 로그가 계속 누적되는 경우(파일이 날짜별로
#     분리되지 않는 경우)에 사용한다.
#   - "yyyymmdd"와 함께 "check.yyyymmdd+" 형태로도 사용 가능
#     (당일 파일을 대상으로 하되, 그 파일을 자정 넘어서까지 계속 이어쓰는 경우).
#
# -----------------------------------------------------------------------------
# 운영자 설정 가이드 — 우리 로그 파일은 어떤 옵션을 써야 하나?
#
#   Q1. 로그 파일이 매일 새 파일로 생성되는가? (예: app.20260612.log)
#       → YES: 파일경로에 "yyyymmdd"를 사용한다.    예) /logs/app.yyyymmdd.log
#       → NO : 파일경로를 그대로 사용한다.          예) /logs/app.log
#
#   Q2. (Q1=NO인 경우) 그 파일은 자정이 지나도 계속 같은 파일에 이어 쓰이는가?
#       → YES: 경로 끝에 '+'를 붙인다.              예) /logs/app.log+
#              (날짜가 바뀌어도 리셋하지 않고 이어서 증분 수집)
#       → NO : 그대로 둔다(기본 동작).              예) /logs/app.log
#              (날짜가 바뀌면 LAST_LINE_NUMBER를 무시하고 1번 라인부터 재수집)
#
#   Q3. 수집 주기 없이 정해진 시각에 한 번만 전체를 읽으면 되는가?
#       → YES: scheduleType을 "배치"로 설정한다. (파일 크기 300MB 미만 권장)
#       → NO : scheduleType을 "주기"로 설정한다.
#
# -----------------------------------------------------------------------------
# [주의] "주기" 수집은 라인 내용이 아니라 라인 수(LAST_LINE_NUMBER) 증분만으로 판단한다.
#   - 매 수집마다 LAST_LINE_NUMBER 다음 라인부터 "현재 파일의 그 위치에 있는 내용"을
#     읽을 뿐, 그 내용이 실제로 새로 추가된 로그인지는 확인하지 않는다.
#   - 따라서 운영 중 파일의 중간/앞부분 라인이 삭제되었다가 다시 로그가 쌓이는 경우,
#     삭제로 비어버린 라인 위치(1~LAST_LINE_NUMBER)에 새로 채워진 로그는
#     "이미 수집함"으로 간주되어 영구히 수집되지 않을 수 있다(데이터 누락).
#   - 반대로 파일이 과거 상태로 복원되어 LAST_LINE_NUMBER 이후 위치에 이미 수집된
#     로그와 동일한 내용이 다시 나타나면, 그 로그가 중복으로 재수집될 수 있다.
#   - 즉 이 정책은 "파일 끝에만 로그가 추가되는(append-only)" 환경을 전제로 한다.
# =============================================================================
