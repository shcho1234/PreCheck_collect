spring:
  application:
    name: precheck-collect
  profiles:
    active: local

precheck:
  collect:
    async:
      core-pool-size: 5
      max-pool-size: 20
      queue-capacity: 100

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.sks.precheck.collect.domain
  configuration:
    map-underscore-to-camel-case: true
